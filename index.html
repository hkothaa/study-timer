<!DOCTYPE html>
<html>
<head>
<title>Study Timer</title>
<!-- Header Font -->
<link href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Double+Ink&display=swap" rel="stylesheet">
<!-- Timer Font -->
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{
    font-family: 'Quicksand', sans-serif;
    text-align:center;
    background:#fff39a;
}

.card{
    background:#fff9d6;
    padding:40px 50px;
    border-radius:30px;
    box-shadow:0 15px 35px rgba(0,0,0,0.08);
}

.colon{
    opacity: 0.6;
}

h1{
    font-family: 'Bitcount Prop Double Ink', sans-serif;
    margin-top:100px;
    font-size:90px;
    font-weight: 600;
    letter-spacing:2px;
    color:#f5e6c8;
}

@keyframes pulse{
    0%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.05);
    }
    100%{
        transform:scale(1);
    }
}

.running{
    animation:pulse 2s infinite ease-in-out;
}

#timer{
    font-family:'Quicksand', sans-serif;
    font-size:90px;
    font-weight: 700;
    letter-spacing:1px;
    color:#ffb7a5;
    margin-bottom:30px;

    font-variant-numeric: tabular-nums;

    text-shadow:
        0 0 4px rgba(255,183,165,0.4),
        0 0 8px rgba(255,183,165,0.2);

    margin: 30px 0;

}

button{
    font-family:'Quicksand', sans-serif;
    font-size:16px;

    padding:12px 28px;
    margin:10px;

    border:none;
    border-radius:25px;

    background:#ffd6cc;
    color:#5a4a42;

    cursor:pointer;

    transition: all 0.2s ease;

    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button:hover{
        background-color:#ffc2b3;
        transform:translateY(-2px);
}

.start{background:#c8f7c5;}
.pause{background:#ffe4b5;}
.reset{background:#ffc6c6;}

#sessions{
    margin-top:30px;
    font-size:20px;
}
</style>
</head>

<body>

    <div class="card">
    
    <h1>Study Timer</h1>
    <div id="timer">45<span class="colon">:</span>00</div>
    
    <button class="start" onclick="startTimer()">Start</button>
    <button class="pause" onclick="pauseTimer()">Pause</button>
    <button class="reset" onclick="resetTimer()">Reset</button>
    
    <div id="sessions">
    Sessions Completed: <span id="count">0</span>
    </div>
    
</div>

<script>


let time = 2700; 
let timer;
let running = false;
let sessions = 0;

function updateDisplay(){
    let minutes = Math.floor(time/60);
    let seconds = time % 60;

    seconds = seconds < 10 ? "0"+seconds : seconds;

    document.getElementById("timer").innerText =
        minutes + ":" + seconds;
}

function startTimer(){

    if(running) return;

    running = true;

    document.getElementById("timer").classList.add("running");

    timer = setInterval(function(){

        time--;

        updateDisplay();

        if(time <= 0){

            clearInterval(timer);

            sessions++;

            document.getElementById("count").innerText = sessions;

            alert("Great job! Time for a 10 minute break.");

            time = 600;

            updateDisplay();

            running = false;

            document.getElementById("timer").classList.remove("running");
        }

    },1000);
}

function pauseTimer(){
    clearInterval(timer);
    running = false;

    document.getElementById("timer").classList.remove("running");
}

function resetTimer(){

clearInterval(timer);

time = 2700;

updateDisplay();

running = false;

document.getElementById("timer").classList.remove("running");
}

</script>

</body>
</html>
