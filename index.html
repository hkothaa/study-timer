<!DOCTYPE html>
<html>
<head>
<title>Study Timer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Header Font -->
<link href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Double+Ink&display=swap" rel="stylesheet">
<!-- Timer Font -->
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{
    font-family: 'Quicksand', sans-serif;
    text-align:center;
    background:#fff39a;
}

.card{
    background:#fff9d6;
    padding:40px;
    border-radius:30px;
    max-width:500px;
    margin: auto;
}

.colon{
    opacity: 0.6;
}

h1{
    font-family: 'Bitcount Prop Double Ink', sans-serif;
    margin-top:100px;
    font-size:90px;
    font-weight: 600;
    letter-spacing:2px;
    color:#f5e6c8;
}

@keyframes pulse{
    0%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.05);
    }
    100%{
        transform:scale(1);
    }
}

.running{
    animation:pulse 2s infinite ease-in-out;
}

#timer{
    font-family:'Quicksand', sans-serif;
    font-size:90px;
    font-weight: 700;
    letter-spacing:1px;
    color:#ffb7a5;
    margin-bottom:30px;

    font-variant-numeric: tabular-nums;

    text-shadow:
        0 0 4px rgba(255,183,165,0.4),
        0 0 8px rgba(255,183,165,0.2);

    margin: 30px 0;

}

button{
    font-family:'Quicksand', sans-serif;
    font-size:16px;

    padding:12px 28px;
    margin:10px;

    border:none;
    border-radius:25px;

    background:#ffd6cc;
    color:#5a4a42;

    cursor:pointer;

    transition: all 0.2s ease;

    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button:hover{
        background-color:#ffc2b3;
        transform:translateY(-2px);
}

.start{background:#c8f7c5;}
.pause{background:#ffe4b5;}
.reset{background:#ffc6c6;}

#sessions{
    margin-top:30px;
    font-size:20px;
}
#darkToggle{
    position: fixed;
    bottom: 25px;
    right: 25px;

    width: 55px;
    height: 55px;

    border-radius: 50%;
    border: none;

    background: #ffd6cc;
    cursor: pointer;

    box-shadow: 0 6px 15px rgba(0,0,0,0.15);
    transition: all 0.2s ease;

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 22px;
    line-height: 1;
    padding: 0;
}
#darkToggle:hover{
    transform: scale(1.1);
}

.dark{
    background:#1e1e1e;
}

.dark .card{
    background:#2c2c2c;
}

.dark h1{
    color:#ffffff;
}

.dark #timer{
    color:#ff9a9a;
}

.dark button{
    background:#3a3a3a;
    color: white;
}
#plant{
    font-size:60px;
    margin:20px 0;
    transition: transform 1s ease;
}

@media (max-width:600px){

h1{
    font-size:48px;
    margin-top:40px;
}

#timer{
    font-size:60px;
}

button{
    padding:10px 20px;
    font-size:14px;
}

}
</style>
</head>

<body>

    <div class="card">
    
    <h1>Study Timer</h1>
    <div id="plant">🌱</div>
    <div id="timer">45<span class="colon">:</span>00</div>
    
    <button class="start" onclick="startTimer()">Start</button>
    <button class="pause" onclick="pauseTimer()">Pause</button>
    <button class="reset" onclick="resetTimer()">Reset</button>
    
    <div id="sessions">
    Sessions Completed: <span id="count">0</span>
    </div>
    
</div>

<script>

let plantStages = ["🌱","🌿","🌳"];

let time = 2700; 
let timer;
let running = false;
let sessions = 0;

function updateDisplay(){
    let minutes = Math.floor(time/60);
    let seconds = time % 60;

    seconds = seconds < 10 ? "0"+seconds : seconds;

    document.getElementById("timer").innerText =
        minutes + ":" + seconds;
}

function startTimer(){

    if(running) return;

    running = true;

    document.getElementById("timer").classList.add("running");

    timer = setInterval(function(){

        time--;
        let progress = (2700 - time) / 2700;

let plant = document.getElementById("plant");

plant.style.transform = "scale(" + (1 + progress*0.8) + ")";

if(progress > 0.66){
    plant.innerText = plantStages[2];
}
else if(progress > 0.33){
    plant.innerText = plantStages[1];
}

        updateDisplay();

        if(time <= 0){

            clearInterval(timer);

            sessions++;

            document.getElementById("count").innerText = sessions;

            confettiBurst();

            alert("Great job! Time for a 10 minute break.");

            time = 600;

            updateDisplay();

            running = false;

            document.getElementById("timer").classList.remove("running");
        }

    },1000);
}

function pauseTimer(){
    clearInterval(timer);
    running = false;

    document.getElementById("timer").classList.remove("running");
}

function resetTimer(){

clearInterval(timer);

time = 2700;

updateDisplay();

running = false;

document.getElementById("timer").classList.remove("running");
document.getElementById("plant").innerText = "🌱";
}
function toggleDarkMode(){
    document.body.classList.toggle("dark");
}

function confettiBurst(){

for(let i=0;i<80;i++){

let confetti = document.createElement("div");

confetti.style.position="fixed";
confetti.style.width="8px";
confetti.style.height="8px";
confetti.style.background="hsl(" + Math.random()*360 + ",80%,60%)";
confetti.style.top="-10px";
confetti.style.left=Math.random()*window.innerWidth + "px";

confetti.style.transition="transform 2s linear";

document.body.appendChild(confetti);

setTimeout(()=>{
confetti.style.transform="translateY(100vh) rotate(720deg)";
},10);

setTimeout(()=>{
confetti.remove();
},2000);

}
}
</script>
<button id="darkToggle" onclick="toggleDarkMode()">🌙</button>
</body>
</html>
